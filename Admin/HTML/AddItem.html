<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Furniture</title>
  <link rel="stylesheet" href="../CSS/AddItem.css">
</head>
<body>
  <header>
    <div class="navbar">
      <nav>
        <div class="logo">
          <img src="../../Assets/Logo/Logo.png" alt="Furniture Hub Logo"> 
          <span>Furniture Hub</span>
        </div>
        <ul>
          <li><a href="#" onclick="goToHomePage()">Home</a></li>
          <li><a href="#" onclick="goToProductPage()">Product</a></li>
          <li><a href="#" onclick="goToReviewPage()">Review</a></li>
          <li><a href="#" onclick="goToContactPage()">Contact</a></li>
          <li><a href="#" onclick="goToAboutPage()">About Us</a></li>
          <li><a href="#"><strong>Call Now</strong></a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="form-container">
    <h2>Add New Furniture</h2>
    <form id="furnitureForm" enctype="multipart/form-data">
      <div class="form-group">
        <label for="name">Name*</label>
        <input type="text" id="name" name="name" placeholder="Modern Chair" required>
      </div>

      <div class="form-group">
        <label for="price">Price*</label>
        <input type="number" id="price" name="price" placeholder="15500.00" required>
      </div>

      <div class="form-group">
        <label for="category">Category*</label>
        <select id="category" name="category" required>
          <option value="">-- Select Category --</option>
          <option value="dining">Dining Sets</option>
          <option value="living">Living Room</option>
          <option value="bedroom">Bed Room</option>
          <option value="chair">Chair</option>
          <option value="table">Table</option>
        </select>
      </div>

      <div class="form-group">
        <label for="image">Image*</label>
        <input type="file" id="image" name="image" accept="image/*" required>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="A beautiful and comfortable piece..."></textarea>
      </div>

      <div class="button-group">
        <button type="button" onclick="resetForm()">Cancel</button>
        <button type="submit">Add Item</button>
      </div>
    </form>
  </div>

  <script>
  
    function goToHomePage() { window.location.href = "../../Customer/HTML/HomePage.html"; }
    function goToProductPage() { window.location.href = "../../Customer/HTML/ProductPage.html"; }
    function goToReviewPage() { window.location.href = "../../Customer/HTML/Review.html"; }
    function goToContactPage() { window.location.href = "../../Customer/HTML/ContactPage.html"; }
    function goToAboutPage() { window.location.href = "../../Customer/HTML/About.html"; }

    
    function resetForm() {
      document.getElementById("furnitureForm").reset();
    }

  
    const form = document.getElementById("furnitureForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const price = document.getElementById("price").value;
      const category = document.getElementById("category").value;
      const description = document.getElementById("description").value;
      const image = document.getElementById("image").files[0];

      if (!image) {
        alert("Please select an image!");
        return;
      }

      const formData = new FormData();
      formData.append("name", name);
      formData.append("price", price);
      formData.append("category", category);
      formData.append("description", description);
      formData.append("image", image);

      try {
        const response = await fetch("http://localhost:5000/api/items", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (response.ok) {
          alert("Item added successfully ✅");
          form.reset();
        } else {
          alert("Error adding item: " + data.message);
        }
      } catch (err) {
        console.error(err);
        alert("Server error. Check console.");
      }
    });
  </script>
</body>
</html>
